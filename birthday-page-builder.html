<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Fête — Birthday Page Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#170D2B;
    --surface:#241542;
    --surface-2:#2E1B54;
    --gold:#F5B942;
    --pink:#FF5D8F;
    --teal:#4FD1C5;
    --text:#F7F3FF;
    --muted:#B8A9D9;
    --line: rgba(247,243,255,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  .display{font-family:'Baloo 2', sans-serif;}
  :focus-visible{outline:3px solid var(--gold); outline-offset:3px;}

  /* string lights signature element */
  .lights{
    width:100%;
    height:64px;
    position:relative;
    overflow:hidden;
  }
  .lights svg{display:block; width:100%; height:100%;}
  .bulb{ animation: twinkle 2.6s ease-in-out infinite; transform-origin:center; }
  .bulb:nth-child(3n){ animation-delay:.4s; }
  .bulb:nth-child(4n){ animation-delay:.9s; }
  .bulb:nth-child(5n){ animation-delay:1.3s; }
  @keyframes twinkle{
    0%,100%{ opacity:.55; filter:drop-shadow(0 0 2px currentColor);}
    50%{ opacity:1; filter:drop-shadow(0 0 8px currentColor);}
  }
  @media (prefers-reduced-motion: reduce){
    .bulb{animation:none; opacity:.9;}
    *{animation-duration:0.001ms !important;}
  }

  .wrap{max-width:640px; margin:0 auto; padding:8px 24px 64px;}
  .eyebrow{
    font-size:13px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin:0 0 6px;
  }
  h1.title{
    font-size:38px; line-height:1.05; margin:0 0 8px; font-weight:800;
  }
  .sub{color:var(--muted); font-size:16px; margin:0 0 32px;}

  /* screens */
  .screen{display:none;}
  .screen.active{display:block;}

  /* gallery */
  .grid{
    display:grid; grid-template-columns:1fr 1fr; gap:14px;
  }
  @media (max-width:420px){ .grid{grid-template-columns:1fr;} }
  .tpl-card{
    border:1px solid var(--line);
    background:var(--surface);
    border-radius:18px;
    padding:20px 16px;
    text-align:center;
    cursor:pointer;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
    position:relative;
    overflow:hidden;
  }
  .tpl-card:hover, .tpl-card:focus-visible{
    transform:translateY(-3px);
    border-color:var(--tc, var(--gold));
    background:var(--surface-2);
  }
  .tpl-swatch{
    width:100%; height:56px; border-radius:12px; margin-bottom:14px;
    background: linear-gradient(120deg, var(--c1), var(--c2) 55%, var(--c3));
    position:relative;
  }
  .tpl-emoji{font-size:26px; display:block; margin-bottom:6px;}
  .tpl-name{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:17px;}

  /* editor */
  .field{margin-bottom:20px;}
  label{display:block; font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:600;}
  input[type=text], input[type=date], textarea{
    width:100%; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; color:var(--text); padding:12px 14px; font-size:15px;
    font-family:inherit;
  }
  textarea{min-height:96px; resize:vertical;}
  .photo-row{display:flex; align-items:center; gap:16px; margin-bottom:24px;}
  .photo-circle{
    width:88px; height:88px; border-radius:50%; flex-shrink:0;
    background:var(--surface); border:3px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; font-size:28px; color:var(--muted);
  }
  .photo-circle img{width:100%; height:100%; object-fit:cover;}
  .btn-upload{
    background:transparent; border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:10px 16px; font-size:14px; cursor:pointer;
  }
  .btn-upload:hover{border-color:var(--gold);}

  .ai-box{
    border:1px dashed var(--line); border-radius:14px; padding:16px; margin-bottom:24px;
    background:rgba(255,255,255,0.02);
  }
  .ai-box .row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
  .ai-box input{flex:1; min-width:140px;}
  .btn{
    font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15px;
    border:none; border-radius:12px; padding:13px 20px; cursor:pointer;
    background:var(--gold); color:#241542;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:disabled{opacity:.5; cursor:default;}
  .btn.secondary{background:transparent; border:1px solid var(--line); color:var(--text);}
  .btn.block{width:100%;}
  .caption-list{display:flex; flex-direction:column; gap:8px; margin-top:14px;}
  .caption-opt{
    text-align:left; background:var(--surface); border:1px solid var(--line);
    color:var(--text); border-radius:10px; padding:12px 14px; font-size:14px;
    cursor:pointer; line-height:1.4;
  }
  .caption-opt:hover{border-color:var(--teal);}
  .actions{display:flex; gap:12px; margin-top:8px;}
  .error{color:var(--pink); font-size:13px; margin-top:8px;}

  /* preview page */
  .preview-page{
    border-radius:24px; padding:48px 28px 40px; text-align:center;
    position:relative; overflow:hidden; border:1px solid var(--line);
  }
  .preview-photo{
    width:120px; height:120px; border-radius:50%; object-fit:cover;
    border:4px solid rgba(255,255,255,0.85); margin:0 auto 20px; display:block;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .preview-age{
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:72px;
    line-height:1; margin:0 0 6px;
  }
  .preview-name{font-family:'Baloo 2', sans-serif; font-weight:700; font-size:24px; margin:0 0 18px;}
  .preview-msg{font-size:16px; line-height:1.6; max-width:440px; margin:0 auto 20px; white-space:pre-wrap;}
  .preview-date{font-size:13px; letter-spacing:.08em; text-transform:uppercase; opacity:.85;}
  .confetti-piece{position:absolute; border-radius:2px; pointer-events:none;}
  @keyframes fall{
    0%{ transform:translateY(-20px) rotate(0deg); opacity:1;}
    100%{ transform:translateY(340px) rotate(340deg); opacity:0;}
  }
  .top-actions{display:flex; justify-content:space-between; margin-bottom:16px;}
  .link-btn{background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:6px 0;}
  .link-btn:hover{color:var(--text);}
</style>
</head>
<body>

<div class="lights" aria-hidden="true">
  <svg viewBox="0 0 640 64" preserveAspectRatio="none">
    <path d="M0,10 Q160,55 320,10 T640,10" fill="none" stroke="rgba(247,243,255,0.18)" stroke-width="2"/>
    <g id="bulbs"></g>
  </svg>
</div>

<div class="wrap">

  <!-- SCREEN 1: GALLERY -->
  <section class="screen active" id="screen-gallery">
    <p class="eyebrow">Night Fête · Free Templates</p>
    <h1 class="title display">Pick a look for their day</h1>
    <p class="sub">Tap a style, add a photo and a message, then let AI help write it.</p>
    <div class="grid" id="tpl-grid"></div>
  </section>

  <!-- SCREEN 2: EDITOR -->
  <section class="screen" id="screen-editor">
    <div class="top-actions">
      <button class="link-btn" id="back-to-gallery">← Back to styles</button>
    </div>
    <p class="eyebrow" id="editor-tpl-label">Style</p>
    <h1 class="title display">Add the details</h1>

    <div class="photo-row">
      <div class="photo-circle" id="photo-preview">📷</div>
      <div>
        <button class="btn-upload" id="upload-btn">Upload photo</button>
        <input type="file" accept="image/*" id="photo-input" style="display:none;">
      </div>
    </div>

    <div class="field">
      <label for="f-name">Name of the birthday person</label>
      <input type="text" id="f-name" placeholder="e.g. Maya">
    </div>
    <div class="field">
      <label for="f-age">Turning</label>
      <input type="text" id="f-age" placeholder="e.g. 21">
    </div>
    <div class="field">
      <label for="f-date">Date</label>
      <input type="date" id="f-date">
    </div>

    <div class="ai-box">
      <p class="eyebrow" style="margin-bottom:10px;">✨ Generate a message with AI</p>
      <div class="row">
        <input type="text" id="ai-vibe" placeholder="Vibe (funny, heartfelt, chaotic...)">
        <input type="text" id="ai-relationship" placeholder="Your relationship (best friend, sister...)">
      </div>
      <button class="btn secondary block" id="ai-generate">Generate 3 message ideas</button>
      <p class="error" id="ai-error" style="display:none;"></p>
      <div class="caption-list" id="ai-results"></div>
    </div>

    <div class="field">
      <label for="f-message">Message</label>
      <textarea id="f-message" placeholder="Write your own, or generate ideas above"></textarea>
    </div>

    <div class="actions">
      <button class="btn block" id="build-page">Create the page →</button>
    </div>
  </section>

  <!-- SCREEN 3: PREVIEW -->
  <section class="screen" id="screen-preview">
    <div class="top-actions">
      <button class="link-btn" id="back-to-editor">← Back to edit</button>
      <button class="link-btn" id="start-over">Start over</button>
    </div>
    <div class="preview-page" id="preview-page"></div>
  </section>

</div>

<script>
const templates = [
  {id:'confetti-pop', emoji:'🎉', name:'Confetti Pop', c1:'#FF5D8F', c2:'#F5B942', c3:'#4FD1C5', bg:'#2E1B54'},
  {id:'golden-hour',  emoji:'🌇', name:'Golden Hour',  c1:'#F5B942', c2:'#FF8A5B', c3:'#FF5D8F', bg:'#3A2410'},
  {id:'pastel-dream', emoji:'🍬', name:'Pastel Dream',  c1:'#FFB6D9', c2:'#C9B6FF', c3:'#B6E6FF', bg:'#3B2A55'},
  {id:'neon-party',   emoji:'🪩', name:'Neon Party',   c1:'#39FF88', c2:'#FF3EC9', c3:'#3EDFFF', bg:'#150A2E'},
  {id:'vintage-film', emoji:'🎞️', name:'Vintage Film', c1:'#D9A566', c2:'#B5654A', c3:'#6E7F5C', bg:'#2A2016'},
  {id:'balloon-pop',  emoji:'🎈', name:'Balloon Pop',  c1:'#FF6B6B', c2:'#FFD93D', c3:'#6BCB77', bg:'#241542'},
  {id:'star-night',   emoji:'⭐', name:'Star Night',   c1:'#F5B942', c2:'#8E7CFF', c3:'#4FD1C5', bg:'#0F0A24'},
  {id:'rainbow-sprinkle', emoji:'🌈', name:'Rainbow Sprinkle', c1:'#FF5D8F', c2:'#F5B942', c3:'#4FD1C5', bg:'#241542'},
];

let state = { template:null, photo:null, name:'', age:'', date:'', message:'' };

// string lights
const bulbColors = ['#F5B942','#FF5D8F','#4FD1C5'];
const bulbsG = document.getElementById('bulbs');
for(let i=0;i<18;i++){
  const t = i/17;
  const x = t*640;
  const y = 10 + Math.sin(t*Math.PI)*45;
  const c = bulbColors[i%3];
  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx',x); circle.setAttribute('cy',y); circle.setAttribute('r',5);
  circle.setAttribute('fill',c); circle.setAttribute('class','bulb'); circle.style.color=c;
  bulbsG.appendChild(circle);
}

// gallery
const grid = document.getElementById('tpl-grid');
templates.forEach(t=>{
  const card = document.createElement('button');
  card.className = 'tpl-card';
  card.style.setProperty('--tc', t.c1);
  card.setAttribute('type','button');
  card.innerHTML = `
    <div class="tpl-swatch" style="--c1:${t.c1};--c2:${t.c2};--c3:${t.c3}"></div>
    <span class="tpl-emoji">${t.emoji}</span>
    <span class="tpl-name">${t.name}</span>
  `;
  card.addEventListener('click', ()=> selectTemplate(t));
  grid.appendChild(card);
});

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function selectTemplate(t){
  state.template = t;
  document.getElementById('editor-tpl-label').textContent = t.emoji + ' ' + t.name;
  showScreen('screen-editor');
}

document.getElementById('back-to-gallery').addEventListener('click', ()=> showScreen('screen-gallery'));

// photo upload
const photoInput = document.getElementById('photo-input');
document.getElementById('upload-btn').addEventListener('click', ()=> photoInput.click());
photoInput.addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    state.photo = ev.target.result;
    document.getElementById('photo-preview').innerHTML = `<img src="${state.photo}" alt="">`;
  };
  reader.readAsDataURL(file);
});

// AI generation
document.getElementById('ai-generate').addEventListener('click', async ()=>{
  const name = document.getElementById('f-name').value.trim() || 'them';
  const age = document.getElementById('f-age').value.trim();
  const vibe = document.getElementById('ai-vibe').value.trim() || 'warm and celebratory';
  const relationship = document.getElementById('ai-relationship').value.trim() || 'a close friend';
  const errEl = document.getElementById('ai-error');
  const resultsEl = document.getElementById('ai-results');
  const btn = document.getElementById('ai-generate');
  errEl.style.display = 'none';
  resultsEl.innerHTML = '';
  btn.disabled = true;
  btn.textContent = 'Generating…';

  const prompt = `Write 3 short birthday messages for a birthday page.
Person's name: ${name}
${age ? `Turning: ${age}` : ''}
Written by: ${relationship}
Tone/vibe: ${vibe}

Each message should be 1-3 sentences, warm, specific to the tone requested, and suitable to display on a birthday page. Return ONLY a JSON array of 3 strings, nothing else, no markdown fences.`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    let text = data.content.map(b => b.text || '').join('');
    text = text.replace(/```json|```/g,'').trim();
    const ideas = JSON.parse(text);
    ideas.forEach(idea=>{
      const optBtn = document.createElement('button');
      optBtn.type = 'button';
      optBtn.className = 'caption-opt';
      optBtn.textContent = idea;
      optBtn.addEventListener('click', ()=>{
        document.getElementById('f-message').value = idea;
      });
      resultsEl.appendChild(optBtn);
    });
  }catch(err){
    errEl.textContent = "Couldn't generate ideas right now — try again, or just write your own message below.";
    errEl.style.display = 'block';
  }finally{
    btn.disabled = false;
    btn.textContent = 'Generate 3 message ideas';
  }
});

// build page
document.getElementById('build-page').addEventListener('click', ()=>{
  state.name = document.getElementById('f-name').value.trim() || 'Someone wonderful';
  state.age = document.getElementById('f-age').value.trim();
  state.date = document.getElementById('f-date').value;
  state.message = document.getElementById('f-message').value.trim() || 'Wishing you the happiest of days.';
  renderPreview();
  showScreen('screen-preview');
});

document.getElementById('back-to-editor').addEventListener('click', ()=> showScreen('screen-editor'));
document.getElementById('start-over').addEventListener('click', ()=> showScreen('screen-gallery'));

function formatDate(d){
  if(!d) return '';
  const [y,m,day] = d.split('-');
  const dt = new Date(Number(y), Number(m)-1, Number(day));
  return dt.toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
}

function renderPreview(){
  const t = state.template;
  const page = document.getElementById('preview-page');
  page.style.background = `linear-gradient(160deg, ${t.bg}, ${t.c1}22)`;

  let confettiHtml = '';
  const colors = [t.c1, t.c2, t.c3];
  for(let i=0;i<24;i++){
    const left = Math.random()*100;
    const delay = Math.random()*1.2;
    const dur = 2 + Math.random()*1.5;
    const size = 5 + Math.random()*5;
    const color = colors[i%3];
    confettiHtml += `<span class="confetti-piece" style="left:${left}%; top:-10px; width:${size}px; height:${size*0.4}px; background:${color}; animation:fall ${dur}s ease-in ${delay}s 1;"></span>`;
  }

  page.innerHTML = `
    ${confettiHtml}
    ${state.photo ? `<img class="preview-photo" src="${state.photo}" alt="${state.name}">` : ''}
    ${state.age ? `<p class="preview-age" style="color:${t.c1}">${state.age}</p>` : ''}
    <p class="preview-name">${t.emoji} Happy Birthday, ${state.name}!</p>
    <p class="preview-msg">${state.message}</p>
    ${state.date ? `<p class="preview-date" style="color:${t.c3}">${formatDate(state.date)}</p>` : ''}
  `;
}
</script>

</body>
</html>
