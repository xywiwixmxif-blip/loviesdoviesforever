<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>loviesdovies</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;color:#fff;text-align:center;background:linear-gradient(-45deg,#ff9ecb,#ff69b4,#ffc3e0);background-size:400% 400%;animation:bg 10s ease infinite}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.hearts{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.hearts span{position:absolute;bottom:-40px;font-size:28px;animation:h 10s linear infinite;opacity:.7}
.hearts span:nth-child(1){left:10%}.hearts span:nth-child(2){left:30%;animation-delay:2s}.hearts span:nth-child(3){left:50%;animation-delay:4s}.hearts span:nth-child(4){left:70%;animation-delay:6s}.hearts span:nth-child(5){left:90%;animation-delay:8s}
@keyframes h{0%{transform:translateY(0)}100%{transform:translateY(-120vh) rotate(360deg);opacity:0}}
.container{max-width:420px;margin:auto;padding:40px 20px}
.profile{width:140px;height:140px;border-radius:50%;object-fit:cover;border:5px solid #fff;animation:f 3s ease-in-out infinite}
@keyframes f{50%{transform:translateY(-10px)}}
.card{background:rgba(255,255,255,.18);backdrop-filter:blur(15px);padding:24px;border-radius:20px;margin-top:25px}
.btn{display:block;background:#fff;color:#ff4fa3;text-decoration:none;font-weight:bold;padding:16px;border-radius:12px;margin-bottom:14px;cursor:pointer;border:none;width:100%;font-size:16px}
.btn:hover{transform:translateY(-4px)}.btn:active{transform:scale(.96)}
.main{background:#ff4fa3;color:#fff}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;align-items:center;justify-content:center}
.overlay.show{display:flex}
.popup{background:linear-gradient(160deg,#fff0f5,#ffe3ec);border-radius:20px;padding:30px 24px;max-width:320px;text-align:center;position:relative;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.popup img{width:100%;border-radius:14px;margin-bottom:16px;border:3px solid #fff}
.popup h2{color:#ff4fa3;margin-bottom:6px}
.goal-bar{background:#ffd6e8;border-radius:20px;height:14px;overflow:hidden;margin:14px 0 6px}
.goal-fill{background:#ff4fa3;height:100%;border-radius:20px;transition:width .6s ease}
.goal-text{color:#c2447d;font-size:14px;margin-bottom:16px}
.close-btn{position:absolute;top:10px;right:14px;background:none;border:none;font-size:22px;color:#ff4fa3;cursor:pointer}
</style></head>
<body>
<div class='hearts'><span>💖</span><span>💕</span><span>💗</span><span>💝</span><span>💞</span></div>
<div class='container'>
<img class='profile' src='images/profile.jpg' alt='Profile'>
<h1 style='margin:20px 0 8px'>loviesdovies</h1>
<p>Get your templates ✨</p>
<div class='card'>
<a class='btn main' href='free.html'>🎁 Free Template</a>
<a class='btn' href='shop.html'>🛍️ Shop Templates</a>
<a class='btn' href='javascript:void(0)' onclick="document.getElementById('tipPopup').classList.add('show')">💰 Tip Me</a>
<a class='btn' href='https://www.instagram.com/sookiee07' target='_blank'>❤️ Follow Me</a>
</div>
<p style='margin-top:20px'>© 2026 loviesdovies</p>
</div>

<div class='overlay' id='tipPopup'>
  <div class='popup'>
    <button class='close-btn' onclick="document.getElementById('tipPopup').classList.remove('show')">✕</button>
    <img src='My_payCircle_QR_1783853224962_2026-07-12_16_32_05.jpg' alt='eSewa QR'>
    <h2>Support loviesdovies 💕</h2>
    <div class='goal-bar'><div class='goal-fill' style='width:5%'></div></div>
    <p class='goal-text'>NPR 50 raised of NPR 10000 goal</p>
  </div>
</div>
</body></html>
